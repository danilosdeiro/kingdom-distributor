<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" />
    <title>MeuKingdom offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #121212;
        color: #f2f2f2;
      }

      body {
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
      }

      main {
        width: min(100%, 360px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        color: #e6d2aa;
        font-size: 1.7rem;
      }

      p {
        margin: 0;
        color: #c7c7c7;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexão</h1>
      <p>O MeuKingdom precisa de internet para manter a sala e os papéis em tempo real.</p>
    </main>
  </body>
</html>
